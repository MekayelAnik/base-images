name: Mirror Base Images to GHCR

on:
  workflow_dispatch:
    inputs:
      force_mirror:
        description: 'Force mirror even if digests match'
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [mirror-base-images]

permissions:
  packages: write
  contents: write

env:
  GHCR_OWNER: ${{ github.repository_owner }}
  # Default images if BASE_IMAGES variable is not set
  DEFAULT_IMAGES: >-
    node:current-alpine,
    node:current-slim,
    node:22-slim,
    golang:1.26-alpine,
    alpine:latest,
    python:3-slim,
    debian:stable-slim

jobs:
  prepare:
    name: Prepare image matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      images_raw: ${{ steps.matrix.outputs.images_raw }}
    steps:
      - name: Build matrix from variable
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          RAW="${{ vars.BASE_IMAGES || env.DEFAULT_IMAGES }}"
          # Parse comma-separated list, trim whitespace, remove empties, build JSON array
          MATRIX=$(echo "$RAW" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | sed '/^$/d' | sort -u | jq -R '.' | jq -sc '{"image": .}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "images_raw=$RAW" >> "$GITHUB_OUTPUT"
          echo "Images to mirror:"
          echo "$MATRIX" | jq -r '.image[]'

  mirror:
    name: Mirror ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [prepare]
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Check digest and mirror ${{ matrix.image }}
        id: mirror
        run: |
          set -euo pipefail
          OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
          SOURCE="docker.io/library/${{ matrix.image }}"
          TARGET="ghcr.io/${OWNER}/base-images/${{ matrix.image }}"
          FORCE="${{ github.event.inputs.force_mirror || 'false' }}"

          # Get source digest from Docker Hub
          SOURCE_DIGEST=""
          SOURCE_DIGEST=$(docker buildx imagetools inspect "$SOURCE" --raw 2>/dev/null | sha256sum | awk '{print "sha256:"$1}') || true

          if [[ -z "$SOURCE_DIGEST" ]]; then
            echo "::warning::Could not inspect source $SOURCE — mirroring unconditionally"
            docker buildx imagetools create -t "$TARGET" "$SOURCE"
            echo "status=mirrored" >> "$GITHUB_OUTPUT"
            echo "reason=source-inspect-failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get target digest from GHCR (may not exist yet)
          TARGET_DIGEST=""
          TARGET_DIGEST=$(docker buildx imagetools inspect "$TARGET" --raw 2>/dev/null | sha256sum | awk '{print "sha256:"$1}') || true

          echo "Source digest: ${SOURCE_DIGEST:0:26}..."
          echo "Target digest: ${TARGET_DIGEST:0:26:-<not found>}..."

          if [[ "$FORCE" != "true" && -n "$TARGET_DIGEST" && "$SOURCE_DIGEST" == "$TARGET_DIGEST" ]]; then
            echo "Already up-to-date — skipping mirror"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "reason=digest-match" >> "$GITHUB_OUTPUT"
          else
            REASON="new-image"
            [[ "$FORCE" == "true" ]] && REASON="force-mirror"
            [[ -n "$TARGET_DIGEST" && "$SOURCE_DIGEST" != "$TARGET_DIGEST" ]] && REASON="digest-changed"

            echo "Mirroring $SOURCE -> $TARGET (reason: $REASON)"
            docker buildx imagetools create -t "$TARGET" "$SOURCE"
            echo "Done: $TARGET"
            echo "status=mirrored" >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          fi

      - name: Job summary
        if: always()
        run: |
          STATUS="${{ steps.mirror.outputs.status }}"
          REASON="${{ steps.mirror.outputs.reason }}"
          IMAGE="${{ matrix.image }}"

          case "$STATUS" in
            skipped)  ICON="⏭️"; DESC="Already up-to-date" ;;
            mirrored) ICON="✅"; DESC="Mirrored ($REASON)" ;;
            *)        ICON="❌"; DESC="Unknown status" ;;
          esac

          echo "| $ICON | \`$IMAGE\` | $DESC |" >> "$GITHUB_STEP_SUMMARY"

  update-readme:
    name: Update README
    runs-on: ubuntu-latest
    needs: [prepare, mirror]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate README
        env:
          RAW_IMAGES: ${{ needs.prepare.outputs.images_raw }}
          GHCR_OWNER_RAW: ${{ github.repository_owner }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -euo pipefail
          OWNER=$(echo "$GHCR_OWNER_RAW" | tr '[:upper:]' '[:lower:]')
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Known "Used By" mappings — update when downstream repos change base images
          declare -A USED_BY=(
            ["node:current-alpine"]="context7-mcp-docker"
            ["node:current-slim"]="—"
            ["node:22-slim"]="gitnexus-docker"
            ["node:22-trixie-slim"]="gitnexus-docker"
            ["node:22-alpine"]="—"
            ["node:alpine"]="MCP docker repos (time, fetch, brave, etc.)"
            ["golang:1.26-alpine"]="db-MCP-server-docker"
            ["alpine:latest"]="nfs-server, samba-server, proftpd, db-MCP"
            ["python:3-slim"]="codegraphcontext-mcp-docker"
            ["debian:bookworm-slim"]="ispyagentdvr"
            ["debian:trixie-slim"]="ispyagentdvr, vllm-cpu, gitnexus-docker"
            ["debian:stable-slim"]="ispyagentdvr"
          )

          # Parse image list
          IMAGES=$(echo "$RAW_IMAGES" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | sed '/^$/d' | sort -u)

          # Build table rows
          TABLE_ROWS=""
          while IFS= read -r IMG; do
            [[ -z "$IMG" ]] && continue
            TARGET="ghcr.io/${OWNER}/base-images/${IMG}"

            # Query architectures
            ARCHS=""
            ARCHS=$(docker buildx imagetools inspect "$TARGET" 2>/dev/null \
              | grep -oP 'linux/\S+' | sort -u | paste -sd ', ' -) || true
            [[ -z "$ARCHS" ]] && ARCHS="N/A"

            # Determine status
            if docker buildx imagetools inspect "$TARGET" &>/dev/null; then
              STATUS="Mirrored"
            else
              STATUS="Not found"
            fi

            USED="${USED_BY[$IMG]:-—}"

            TABLE_ROWS="${TABLE_ROWS}| \`${IMG}\` | \`${TARGET}\` | ${ARCHS} | ${USED} | ${STATUS} |"$'\n'
          done <<< "$IMAGES"

          # Write README
          cat > README.md <<READMEEOF
# Base Images Mirror

[![Mirror Base Images to GHCR](https://github.com/${REPO_FULL}/actions/workflows/mirror-base-images.yml/badge.svg)](https://github.com/${REPO_FULL}/actions/workflows/mirror-base-images.yml)

Centralized Docker base image mirror from Docker Hub to GitHub Container Registry (GHCR).

## Purpose

Avoids Docker Hub pull rate limits by mirroring base images to GHCR, which has unlimited pulls with \`GITHUB_TOKEN\` in GitHub Actions.

## Mirrored Images

> **Last synced:** ${TIMESTAMP}

| Source (Docker Hub) | GHCR Mirror | Architectures | Used By | Status |
|:-------------------|:------------|:--------------|:--------|:-------|
${TABLE_ROWS}
## Adding / Removing Images

1. Go to **Settings > Variables > Actions** in this repo
2. Edit the \`BASE_IMAGES\` variable (comma-separated list)
3. Trigger the workflow — no code changes needed

## Trigger

- **cron-job.org**: POST to \`https://api.github.com/repos/${REPO_FULL}/dispatches\` with body \`{"event_type": "mirror-base-images"}\`
- **Manual**: Actions > Mirror Base Images to GHCR > Run workflow

## Usage in Other Repos

Set \`BASE_IMAGE_DEFAULT\` variable in your repo:

\`\`\`
ghcr.io/${OWNER}/base-images/node:22-slim
\`\`\`

---

*This README is auto-generated by the [mirror workflow](https://github.com/${REPO_FULL}/actions/workflows/mirror-base-images.yml). Do not edit manually.*
READMEEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: auto-update README with mirror status"
            git push
            echo "README updated and pushed."
          else
            echo "README unchanged — skipping commit."
          fi
