name: Mirror Base Images to GHCR

on:
  workflow_dispatch:
    inputs:
      force_mirror:
        description: 'Force mirror even if digests match'
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [mirror-base-images]

permissions:
  packages: write
  contents: write

concurrency:
  group: base-images-mirror-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_OWNER: ${{ github.repository_owner }}
  # Default images if BASE_IMAGES variable is not set
  DEFAULT_IMAGES: >-
    node:current-alpine,
    node:current-slim,
    node:22-slim,
    golang:1.26-alpine,
    alpine:latest,
    python:3-slim,
    debian:stable-slim

jobs:
  prepare:
    name: Prepare image matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      images_raw: ${{ steps.matrix.outputs.images_raw }}
    steps:
      - name: Build matrix from variable
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          RAW="${{ vars.BASE_IMAGES || env.DEFAULT_IMAGES }}"
          # Parse comma-separated list, trim whitespace, remove empties, build JSON array
          MATRIX=$(echo "$RAW" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | sed '/^$/d' | sort -u | jq -R '.' | jq -sc '{"image": .}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "images_raw=$RAW" >> "$GITHUB_OUTPUT"
          echo "Images to mirror:"
          echo "$MATRIX" | jq -r '.image[]'

  mirror:
    name: Mirror ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [prepare]
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Check digest and mirror ${{ matrix.image }}
        id: mirror
        run: |
          set -euo pipefail
          OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ matrix.image }}"
          # Namespaced images (e.g. moby/buildkit) use docker.io/<image> directly;
          # official library images (e.g. node, alpine) use docker.io/library/<image>
          if [[ "$IMAGE" == */* ]]; then
            SOURCE="docker.io/${IMAGE}"
          else
            SOURCE="docker.io/library/${IMAGE}"
          fi
          TARGET="ghcr.io/${OWNER}/base-images/${IMAGE}"
          FORCE="${{ github.event.inputs.force_mirror || 'false' }}"

          # Get source digest from Docker Hub
          SOURCE_DIGEST=""
          SOURCE_DIGEST=$(docker buildx imagetools inspect "$SOURCE" --raw 2>/dev/null | sha256sum | awk '{print "sha256:"$1}') || true

          if [[ -z "$SOURCE_DIGEST" ]]; then
            echo "::warning::Could not inspect source $SOURCE — mirroring unconditionally"
            docker buildx imagetools create -t "$TARGET" "$SOURCE"
            echo "status=mirrored" >> "$GITHUB_OUTPUT"
            echo "reason=source-inspect-failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get target digest from GHCR (may not exist yet)
          TARGET_DIGEST=""
          TARGET_DIGEST=$(docker buildx imagetools inspect "$TARGET" --raw 2>/dev/null | sha256sum | awk '{print "sha256:"$1}') || true

          echo "Source digest: ${SOURCE_DIGEST:0:26}..."
          if [[ -n "$TARGET_DIGEST" ]]; then
            echo "Target digest: ${TARGET_DIGEST:0:26}..."
          else
            echo "Target digest: <not found>"
          fi

          if [[ "$FORCE" != "true" && -n "$TARGET_DIGEST" && "$SOURCE_DIGEST" == "$TARGET_DIGEST" ]]; then
            echo "Already up-to-date — skipping mirror"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "reason=digest-match" >> "$GITHUB_OUTPUT"
          else
            REASON="new-image"
            [[ "$FORCE" == "true" ]] && REASON="force-mirror"
            [[ -n "$TARGET_DIGEST" && "$SOURCE_DIGEST" != "$TARGET_DIGEST" ]] && REASON="digest-changed"

            echo "Mirroring $SOURCE -> $TARGET (reason: $REASON)"
            docker buildx imagetools create -t "$TARGET" "$SOURCE"
            echo "Done: $TARGET"
            echo "status=mirrored" >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          fi

      - name: Job summary
        if: always()
        run: |
          STATUS="${{ steps.mirror.outputs.status }}"
          REASON="${{ steps.mirror.outputs.reason }}"
          IMAGE="${{ matrix.image }}"

          case "$STATUS" in
            skipped)  ICON="⏭️"; DESC="Already up-to-date" ;;
            mirrored) ICON="✅"; DESC="Mirrored ($REASON)" ;;
            *)        ICON="❌"; DESC="Unknown status" ;;
          esac

          echo "| $ICON | \`$IMAGE\` | $DESC |" >> "$GITHUB_STEP_SUMMARY"

  update-readme:
    name: Update README
    runs-on: ubuntu-latest
    needs: [prepare, mirror]
    if: always()
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate README
        env:
          RAW_IMAGES: ${{ needs.prepare.outputs.images_raw }}
          GHCR_OWNER_RAW: ${{ github.repository_owner }}
          REPO_FULL: ${{ github.repository }}
        run: bash .github/scripts/generate-readme.sh

      - name: Commit and push if changed
        shell: bash
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README unchanged — skipping commit."
            exit 0
          fi
          git commit -m "docs: auto-update README with mirror status"

          MAX_ATTEMPTS=5
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if git push origin "HEAD:${BRANCH}"; then
              echo "README pushed on attempt ${attempt}."
              exit 0
            fi
            if [[ "$attempt" -eq "$MAX_ATTEMPTS" ]]; then
              break
            fi
            echo "Push rejected on attempt ${attempt}; rebasing on origin/${BRANCH}..."
            if ! git pull --rebase --autostash --strategy-option=theirs origin "${BRANCH}"; then
              git rebase --abort >/dev/null 2>&1 || true
              echo "::error::Rebase failed on attempt ${attempt}"
              exit 1
            fi
            sleep "$(( (RANDOM % 4) + 2 ))"
          done
          echo "::error::Failed to push README after ${MAX_ATTEMPTS} attempts"
          exit 1
