name: Mirror Base Images to GHCR

on:
  workflow_dispatch:
  repository_dispatch:
    types: [mirror-base-images]

permissions:
  packages: write

env:
  GHCR_OWNER: ${{ github.repository_owner }}
  # Default images if BASE_IMAGES variable is not set
  DEFAULT_IMAGES: >-
    node:current-alpine,
    node:current-slim,
    node:22-slim,
    golang:1.26-alpine,
    alpine:latest,
    python:3-slim,
    debian:stable-slim

jobs:
  prepare:
    name: Prepare image matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Build matrix from variable
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          RAW="${{ vars.BASE_IMAGES || env.DEFAULT_IMAGES }}"
          # Parse comma-separated list, trim whitespace, remove empties, build JSON array
          MATRIX=$(echo "$RAW" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | sed '/^$/d' | sort -u | jq -R '.' | jq -sc '{"image": .}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Images to mirror:"
          echo "$MATRIX" | jq -r '.image[]'

  mirror:
    name: Mirror ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [prepare]
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Mirror ${{ matrix.image }}
        run: |
          set -euo pipefail
          OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
          SOURCE="docker.io/library/${{ matrix.image }}"
          TARGET="ghcr.io/${OWNER}/base-images/${{ matrix.image }}"

          echo "Mirroring $SOURCE -> $TARGET"
          docker buildx imagetools create -t "$TARGET" "$SOURCE"
          echo "Done: $TARGET"
